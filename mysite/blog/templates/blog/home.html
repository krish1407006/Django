<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
</head>
<body>
    <h1>Welcome to the Blog</h1>

    <p>name : {{ name }}</p>

    {% if age >= 18 %}
        <p>you are eligible for voting</p>
    {% else %}
        <p>you are not eligible for voting  age: {{ age }}</p>
        <p>age: {{ age }}</p>
    {% endif %}
</body>
</html>
